<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Font Awesome Icon Liste</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    ul {
      list-style: none;
      padding-left: 0;
    }
    li {
      margin-bottom: 10px;
      font-size: 18px;
    }
    i {
      margin-right: 10px;
    }
    div {
      background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      height: 20px;
      width: 16px;
    }
  </style>
</head>
<body>

  <h1>Font Awesome Icons (fas & fab)</h1>

  <ul>
    <!-- fas (Solid) Icons -->
    <li><i class="fas fa-code" style="color: green;"></i> Code</li>
    <li><i class="fas fa-search"style="color: gray;"></i> Suche</li>
    <li><i class="fas fa-user"style="color: gray;"></i> Benutzer</li>
    <li><i class="fas fa-lock"style="color: gray;"></i> Schloss</li>
    <li><i class="fas fa-paper-plane"style="color: blue;"></i> Papierflieger (Senden)</li>
    <li><i class="fas fa-comment"style="color: lightgreen;"></i> Kommentar</li>
    <li><i class="fas fa-heart"style="color: red;"></i> Herz</li>
    <li><i class="fas fa-camera"style="color: black;"></i> Kamera</li>
    <li><i class="fas fa-shopping-cart"style="color: gray;"></i> Einkaufswagen</li>
    <li><i class="fas fa-file"style="color: gray;"></i> Datei</li>

    <!-- fab (Brand) Icons -->
    <li><i class="fab fa-github"style="color: black;"></i> GitHub</li>
    <li><i class="fab fa-facebook"style="color: blue;"></i> Facebook</li>
    <li><i class="fab fa-twitter"style="color: lightblue;"></i> Twitter</li>
    <li><div><i class="fab fa-instagram instagram" style="color: white;"></i></div> Instagram</li>
    <li><i class="fab fa-linkedin"style="color: blue;"></i> LinkedIn</li>
    <li><i class="fab fa-youtube"style="color: red;"></i> YouTube</li>
    <li><i class="fab fa-android"style="color: lightgreen;"></i> Android</li>
    <li><i class="fab fa-apple"style="color: black;"></i> Apple</li>
    <li><i class="fab fa-google"style="color: black;"></i> Google</li>
    <li><i class="fab fa-stack-overflow"style="color: black;"></i> Stack Overflow</li>
  </ul>

</body>
</html>
